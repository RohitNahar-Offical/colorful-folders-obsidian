name: Build and Attest

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestation (main.js)
        uses: actions/attest@v1
        with:
          subject-path: 'main.js'
          predicate-type: 'https://slsa.dev/provenance/v1.0'
          predicate-path: '.github/predicates/predicate.json'

      - name: Generate artifact attestation (manifest.json)
        uses: actions/attest@v1
        with:
          subject-path: 'manifest.json'
          predicate-type: 'https://slsa.dev/provenance/v1.0'
          predicate-path: '.github/predicates/predicate.json'

      - name: Generate artifact attestation (styles.css)
        uses: actions/attest@v1
        with:
          subject-path: 'styles.css'
          predicate-type: 'https://slsa.dev/provenance/v1.0'
          predicate-path: '.github/predicates/predicate.json'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: colorful-folders-build
          path: |
            main.js
            manifest.json
            styles.css

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
